<body><header><h1>Casualty Care Simulator</h1><p>Prototype V17 · Reinforces RNLI casualty care between training sessions · Does not replace training, SOPs or cards</p></header><main><div class="status"><span id="stepText">Ready</span><span id="scenarioText" class="small">Practice</span></div><div class="progress"><div id="bar" class="bar"></div></div><div class="card" id="app"></div></main>

function a(text,next,correct,feedback,correctWhy){return{text,next,correct,feedback,correctWhy}}function f(label,text){return `<div class="finding"><b>${label} –</b> ${text}</div>`}function task(lines){return `<div class="scenario"><p><b>Situation</b></p>${lines.map(x=>`<p>${x}</p>`).join("")}</div>`}function review(){return{title:"Review",body:"",question:"",actions:[]}}function proceed(){return a("Proceed to casualty",1,true,"You approach the casualty.","Proceed to casualty so you can make an initial assessment.")}
function cardTags(cards){return `<p class="small"><b>Relevant cards:</b></p><div class="card-tags">${cards.map(c=>`<span class="card-tag">${c}</span>`).join("")}</div>`}
function abbreviationSupport(text){
  let blocks=[];
  if(/SAMPLE/.test(text)){
    blocks.push(`<b>SAMPLE:</b><br><b>S</b> – Signs and Symptoms<br><b>A</b> – Allergies<br><b>M</b> – Medications<br><b>P</b> – Past Medical History<br><b>L</b> – Last Meal<br><b>E</b> – Events Leading Up`);
  }
  if(/FAST/.test(text)){
    blocks.push(`<b>FAST:</b><br><b>F</b> – Face<br><b>A</b> – Arms<br><b>S</b> – Speech<br><b>T</b> – Time`);
  }
  if(/AVPU/.test(text)){
    blocks.push(`<b>AVPU:</b><br><b>A</b> – Alert<br><b>V</b> – Responds to Voice<br><b>P</b> – Responds to Pain<br><b>U</b> – Unresponsive`);
  }
  return blocks.length?`<br><br>${blocks.join("<br><br>")}`:"";
}

const scenarioGroups={practice:practiceScenarios,developing:developingScenarios,operational:operationalScenarios};
function cardsForScenario(){
  if(currentMode==="practice"){return nextCfg(sc().name).cards||[]}
  if(currentMode==="developing"){
    if(sc().name.includes("chest pain"))return ["Assessment","Chest Pain","Monitoring","SAMPLE"];
    if(sc().name.includes("water inhalation"))return ["Assessment","Breathing Problems / Water Inhalation","Monitoring","SAMPLE"];
    if(sc().name.includes("head injury"))return ["Assessment","Head Injury","Reduced Response","Monitoring"];
  }
  if(currentMode==="operational"){if(sc().name.includes("Ten Second"))return ["Ten Second Triage"];return ["Assessment","Prioritisation","Ten Second Triage concepts"];}
  return [];
}
function reviewCardList(){
  const cards=cardsForScenario();
  if(!cards.length)return "";
  return `<div class="review-cards"><p class="question">Relevant cards used</p><ul>${cards.map(c=>`<li><span class="tick">✓</span> ${c}</li>`).join("")}</ul></div>`;
}
function loadCompleted(){try{const s=JSON.parse(sessionStorage.getItem("ccsCompletedV12")||"[]");return Array.isArray(s)?s:[]}catch(e){return[]}}function saveCompleted(){sessionStorage.setItem("ccsCompletedV12",JSON.stringify(completed))}function key(m=currentMode,i=scenarioIndex){return`${m}-${i}`}function done(m,i){return completed.includes(key(m,i))}function markDone(){if(!done(currentMode,scenarioIndex)){completed.push(key());saveCompleted()}}function resetProgress(){completed=[];saveCompleted();renderMenu();scrollTop()}function allKeys(){return Object.keys(scenarioGroups).flatMap(m=>scenarioGroups[m].map((_,i)=>`${m}-${i}`))}function totalDone(){return allKeys().filter(k=>completed.includes(k)).length}function incomplete(m){return scenarioGroups[m].map((_,i)=>i).filter(i=>!done(m,i))}function screens(){return scenarioGroups[currentMode][scenarioIndex].screens}function sc(){return scenarioGroups[currentMode][scenarioIndex]}function scrollTop(){window.scrollTo({top:0,behavior:"smooth"})}
function modeCard(m,title,body,buttonText){
  return `<div class="choice-card"><h3>${title}</h3><p class="small">${body}</p><div class="actions"><button class="primary" onclick="renderScenarioList('${m}')">${buttonText}</button></div></div>`;
}
function scenarioCard(m,i){
  const s=scenarioGroups[m][i];
  return `<div class="choice-card"><h3>${s.name} <span class="${done(m,i)?'tick':'small'}">${done(m,i)?'✓':''}</span></h3><p class="small">${s.summary}</p><div class="actions"><button class="primary" onclick="startScenario('${m}',${i})">Start</button></div></div>`;
}
function randomCard(m,label){
  return `<div class="choice-card"><h3>Random ${label}</h3><p class="small">Start a random scenario from this section.</p><div class="actions"><button class="primary" onclick="startRandom('${m}')">Start</button></div></div>`;
}
function renderMenu(){
  attemptLog={};
  document.getElementById("stepText").textContent=totalDone()+" completed";
  document.getElementById("scenarioText").textContent="Choose mode";
  document.getElementById("bar").style.width=Math.round((totalDone()/allKeys().length)*100)+"%";
  let html=`<h2>How would you like to practise?</h2>`;
  html+=modeCard("practice","Practice Scenarios","Static casualty scenarios. Reinforce DRCABC, Big Sick / Little Sick and card selection.","Start Practice");
  html+=modeCard("developing","Developing Scenarios","Casualty condition changes after initial assessment. Practise reassessment and adapting to new information.","Start Developing");
  html+=modeCard("operational","Multi-Casualty Prioritisation","Multiple casualties requiring prioritisation before treatment begins.","Start Multi-Casualty");
  if(totalDone())html+=`<div class="actions"><button class="secondary" onclick="resetProgress()">Reset progress</button></div>`;
  document.getElementById("app").innerHTML=html;
}
function renderScenarioList(m){
  attemptLog={};
  currentMode=m;
  const title=m==="practice"?"Practice Scenarios":m==="developing"?"Developing Scenarios":"Multi-Casualty Prioritisation";
  const randomLabel=m==="practice"?"Practice":m==="developing"?"Developing":"Multi-Casualty";
  document.getElementById("stepText").textContent=totalDone()+" completed";
  document.getElementById("scenarioText").textContent=title;
  document.getElementById("bar").style.width=Math.round((totalDone()/allKeys().length)*100)+"%";
  let html=`<h2>${title}</h2>`;
  html+=`<div class="actions"><button class="secondary" onclick="renderMenu()">Back</button></div>`;
  if(scenarioGroups[m].length>1 || m==="operational")html+=randomCard(m,randomLabel);
  scenarioGroups[m].forEach((s,i)=>{html+=scenarioCard(m,i)});
  document.getElementById("app").innerHTML=html;
  scrollTop();
}
function startRandom(m){let a=incomplete(m);if(!a.length)a=scenarioGroups[m].map((_,i)=>i);startScenario(m,a[Math.floor(Math.random()*a.length)])}
function startScenario(m,i){currentMode=m;scenarioIndex=i;step=0;attemptLog={};render();scrollTop()}
function render(){let ss=screens(),s=ss[step],onReview=step===ss.length-1;if(onReview)markDone();document.getElementById("stepText").textContent="Step "+(step+1)+" of "+ss.length;document.getElementById("scenarioText").textContent=modeLabels[currentMode]+" · Scenario "+(scenarioIndex+1)+(done(currentMode,scenarioIndex)?" ✓":"");document.getElementById("bar").style.width=Math.round((step/(ss.length-1))*100)+"%";let html=`<h2>${s.title}</h2>`;if(onReview)html+=reviewHtml();else{html+=s.body;if(s.question)html+=`<p class="question">${s.question}</p>`;html+=`<div class="actions">`;s.actions.forEach((act,i)=>html+=`<button onclick="choose(${i})" class="answer ${step===0||s.transition?'primary':''}">${act.text}</button>`);html+=`</div><div id="feedback" class="feedback"></div><div id="continue" class="continue"></div>`}document.getElementById("app").innerHTML=html}
function reviewHtml(){let ss=screens(),dec=ss.map((s,i)=>i).filter(i=>i>0&&i<ss.length-1&&ss[i].actions&&ss[i].actions.length>1),cf=dec.filter(i=>attemptLog[i]===true).length,corr=dec.filter(i=>attemptLog[i]===false).length,s=sc();let html=`<div class="review-banner"><b>Scenario complete.</b><br>${s.name}</div><div class="score-grid"><div class="score-box"><b>${cf}/${dec.length}</b><span class="small">Correct first time</span></div><div class="score-box"><b>${corr}</b><span class="small">Required correction</span></div></div><p class="question">Key learning points</p><ul>`;s.learning.forEach(l=>html+=`<li>${l}</li>`);html+=`</ul>`+reviewCardList()+`<div class="actions">`;if(currentMode==="practice")html+=`<button onclick="startRandom('practice')" class="primary">Try random practice scenario</button>`;else if(currentMode==="developing")html+=`<button onclick="startRandom('developing')" class="primary">Try random developing scenario</button>`;else html+=`<button onclick="startScenario('operational',0)" class="primary">Restart multi-casualty scenario</button>`;return html+`<button onclick="restartScenario()" class="secondary">Restart scenario</button><button onclick="renderMenu()" class="secondary">Back to start</button></div>`}
function choose(i){let ss=screens(),s=ss[step],chosen=s.actions[i],next=chosen.next;if((step===0||s.transition)&&s.actions.length===1){step=next;render();scrollTop();return}if(attemptLog[step]===undefined)attemptLog[step]=!!chosen.correct;let ci=s.actions.findIndex(x=>x.correct);document.querySelectorAll("button.answer").forEach((b,idx)=>{b.disabled=true;b.classList.remove("primary");if(idx===i)b.classList.add("selected");if(idx===ci)b.classList.add("correct");if(idx===i&&!chosen.correct)b.classList.add("incorrect");if(idx!==i&&idx!==ci)b.classList.add("muted")});let fb=document.getElementById("feedback");fb.className="feedback show "+(chosen.correct?"good":"warn");if(chosen.correct){
  fb.innerHTML=`<b>Good decision.</b> ${chosen.feedback}${abbreviationSupport(chosen.feedback+" "+chosen.correctWhy)}`;
}else{
  const supportText=chosen.feedback+" "+s.actions[ci].correctWhy;
  fb.innerHTML=`<b>Prompt.</b> ${chosen.feedback}<br><br><b>Correct pathway:</b> ${s.actions[ci].correctWhy}${abbreviationSupport(supportText)}`;
}
document.getElementById("continue").innerHTML=`<button class="primary" onclick="go(${next})">Continue</button>`}
function restartScenario(){step=0;attemptLog={};render();scrollTop()}function go(n){step=n;render();scrollTop()}renderMenu();
</script></body></html>
