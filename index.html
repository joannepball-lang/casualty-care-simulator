function makePractice(o){return{name:o.name,summary:o.summary,learning:o.learning,screens:[{title:"Tasking",body:task(o.task),question:"",actions:[proceed()]},{title:"Arrival",body:`<p>${o.arrival}</p>`,question:"What do you do first?",actions:[a(o.first||"Start DRCABC assessment",2,true,"A structured first assessment reduces the chance of missing a life-threatening problem.","Start with DRCABC before narrowing the problem."),a("Select a casualty care card",2,false,"Cards support care after assessment, but they should not replace the initial DRCABC check.","Start DRCABC first."),a(o.wrongFirst||"Ask detailed history",2,false,"This may be useful later, but DRCABC comes first.","Start DRCABC first.")]},{title:"Assessment",body:`<p>You perform DRCABC.</p><div class="findings">${o.findings}</div>`,question:o.q1||"What is the main problem?",actions:o.assess},{title:"Immediate priority",body:o.priorityBody,question:o.q2||"What should you do next?",actions:o.priority},{title:"Big Sick / Little Sick",body:`<div class="findings">${o.bigSickFindings||o.findings}</div>`,question:"Big Sick or Little Sick?",actions:[a(o.big||"Big Sick",5,true,o.bigFeedback||"The findings need caution, monitoring and escalation rather than being treated as minor.",o.bigWhy||"Treat this casualty as Big Sick."),a("Little Sick",5,false,o.littleFeedback||"The findings are not suitable for a low-priority assumption.",o.bigWhy||"Treat this casualty as Big Sick.")]},{title:"Card selection",body:o.cardBody,question:"Which card best fits?",actions:o.cards},review()]}}

makePractice({name:"External limb bleed",summary:"Slip on rocks · heavy lower leg bleed",task:["Male, 50s.","Slipped on rocks.","Reported injured."],arrival:"He is sitting on rocks, holding his lower left leg. He appears distressed.",findings:f("D","Safe enough. Slip on rocks.")+f("R","Alert.")+f("C","Heavy lower leg bleed.")+f("A","Airway clear.")+f("B","36/min.")+f("C","Central cap refill 4 seconds."),q1:"What is your immediate priority?",assess:[a("Control the life-threatening bleed",3,true,"Life-threatening external bleeding is an immediate priority and should be controlled before lower-priority history taking or pain relief.","Control the life-threatening bleed first."),a("Ask SAMPLE questions",3,false,"SAMPLE can help later, but it should not delay treatment of heavy bleeding.","Control the life-threatening bleed first."),a("Give pain relief",3,false,"Pain relief matters, but uncontrolled heavy bleeding is the immediate threat.","Control the life-threatening bleed first.")],priorityBody:"<p>You apply direct pressure and a trauma dressing. Bleeding continues heavily.</p>",q2:"What next?",priority:[a("Apply a tourniquet and note the time",4,true,"If heavy limb bleeding continues despite pressure and dressing, escalate bleed control and record the tourniquet time.","Apply a tourniquet and note the time."),a("Release pressure and reassess",4,false,"Releasing pressure unnecessarily risks worsening the bleed.","Apply a tourniquet and note the time."),a("Move straight to evacuation",4,false,"Evacuation matters, but the bleed still needs controlling before moving on.","Apply a tourniquet and note the time.")],bigFeedback:"Breathing rate over 30 and central cap refill over 3 seconds are Big Sick indicators, even if the casualty is alert.",bigWhy:"This casualty is Big Sick.",cardBody:"<p>External limb bleed controlled. Casualty is Big Sick.</p>",cards:[a("Card 4 — External Bleed / Crush",6,true,"The main problem is visible external limb bleeding, so the external bleed c makePractice({name:"Unconscious casualty recovered from water (CPR)",summary:"Pulled from water · not responding",task:["Adult casualty.","Pulled from water.","Reported unconscious."],arrival:"The casualty is on the beach. Bystanders are nearby. They are not moving.",first:"Check danger and response",wrongFirst:"Start chest compressions immediately",findings:f("D","Safe enough. Wet/cold environment.")+f("R","No response.")+f("A","Airway opened.")+f("B","Not breathing normally.")+f("C","No signs of life."),q1:"What is your immediate priority?",assess:[a("Begin resuscitation and call for AED",3,true,"Not breathing normally is an immediate life-threatening finding, so resuscitation and AED preparation should start now.","Begin resuscitation and call for an AED."),a("Put them in recovery position",3,false,"Recovery position is for a casualty who is breathing normally.","Begin resuscitation and call for an AED."),a("Ask bystanders what happened",3,false,"History is useful, but it must not delay resuscitation.","Begin resuscitation and call for an AED.")],priorityBody:"<p>CPR is underway. AED is on its way. Crew are available.</p>",q2:"What helps most now?",priority:[a("Clear roles: CPR, AED, comms, kit",4,true,"Clear role allocation helps CPR, AED preparation, communications and casualty management happen simultaneously.","Allocate clear roles early."),a("Everyone reads the card together",4,false,"One person can check the card, but the team still needs clear roles.","Allocate clear roles early."),a("Wait for paramedics",4,false,"Continue immediate care while help is coming.","Allocate clear roles early and continue immediate care.")],bigFeedback:"Unresponsive and not breathing normally is immediately life-threatening.",bigWhy:"This casualty is Big Sick.",cardBody:"<p>Unconscious casualty pulled from water. Not breathing normally.</p>",cards:[a("Card 2 — Not Breathing / CPR",6,true,"The casualty is not breathing normally, so the CPR card is the best fit.","Card 2 — Not Breathing / CPR is the best fit."),a("Card 3 — Breathing Problems",6,false,"This is beyond breathing difficulty; they are not breathing normally.","Card 2 — Not Breathing / CPR is the best fit."),a("Card 8 — Hypothermia",6,false,"Cold exposure matters, but CPR is the priority card.","Card 2 — Not Breathing / CPR is the best fit.")],learning:["Check danger, response and breathing.","Start resuscitation when not breathing normally.","Allocate roles early so CPR, AED, communications and kit preparation can happen together.","Use the CPR card when the casualty is not breathing normally."]}),
makePractice({name:"Chest pain",summary:"Afloat · pale, sweaty, chest pain",task:["Male, 60s.","Onboard casualty vessel.","Chest pain reported."],arrival:"He is seated, pale and sweaty. He says his chest feels tight.",findings:f("D","Boat made safe enough.")+f("R","Alert but anxious.")+f("A","Airway clear.")+f("B","24/min.")+f("C","Pale, sweaty. Central cap refill 3 seconds.")+f("Pain","Central chest tightness."),q1:"What is your immediate priority?",assess:[a("Rest, reassure, monitor, update Coastguard",3,true,"Chest pain with pale, sweaty signs should be treated as serious. Rest and early communication support onward care.","Rest, reassure, monitor and update Coastguard."),a("Get him walking to the lifeboat",3,false,"Avoid exertion with chest pain unless movement is essential for safety.","Rest, reassure, monitor and update Coastguard."),a("Focus on seasickness",3,false,"Chest pain with pale, sweaty presentation is higher risk than simple seasickness.","Rest, reassure, monitor and update Coastguard.")],priorityBody:"<p>He remains pale and sweaty. Pain is still present.</p>",q2:"What next?",priority:[a("Check own GTN/aspirin and follow card",4,true,"Medication should only be considered within the card guidance and casualty's own medication context.","Check own GTN/aspirin and follow the card."),a("Give any painkiller available",4,false,"Do not improvise medication outside guidance.","Check own GTN/aspirin and follow the card."),a("Delay update until ashore",4,false,"Early update helps prepare onward care.","Check own GTN/aspirin and follow the card.")],bigFeedback:"Chest pain with pale, sweaty signs and delayed cap refill should be treated as Big Sick.",bigWhy:"This casualty is Big Sick.",cardBody:"<p>Ongoing chest pain with pale, sweaty presentation.</p>",cards:[a("Card 7 — Chest Pain",6,true,"The main problem is chest pain, so the specific chest pain card is the best fit.","Card 7 — Chest Pain is the best fit."),a("Card 3 — Breathing Problems",6,false,"Breathing is raised, but chest pain is the main problem.","Card 7 — Chest Pain is the best fit."),a("Card 10 — Medical Illness",6,false,"Use the more specific card when it fits the problem.","Card 7 — Chest Pain is the best fit.")],learning:["Start with DRCABC, even when the problem sounds medical.","Minimise exertion for chest pain.","Pale, sweaty presentation and poor circulation signs are red flags.","Use the specific chest pain card rather than a general medical card."]}),
makePractice({name:"Suspected stroke",summary:"Face/arm/speech changes",task:["Female, 70s.","Sudden weakness and slurred speech.","On a promenade."],arrival:"She is sitting on a bench. Her face looks uneven and speech is slurred.",findings:f("D","Safe enough.")+f("R","Alert but confused.")+f("A","Airway clear.")+f("B","20/min.")+f("C","Warm, cap refill 2 seconds.")+f("FAST","Face droop, arm weakness, speech changed."),assess:[a("Suspected stroke",3,true,"The face, arm and speech findings point to suspected stroke and need early communication.","Identify suspected stroke and escalate early."),a("Minor injury only",3,false,"The signs are more significant than a minor injury.","Identify suspected stroke and escalate early."),a("Seasickness",3,false,"The pattern fits neurological signs rather than seasickness.","Identify suspected stroke and escalate early.")],priorityBody:"<p>The stroke signs are still present.</p>",priority:[a("Monitor, record timing, update Coastguard",4,true,"Time and changes matter in suspected stroke, and early updates support onward care.","Monitor, record timing and update Coastguard."),a("Let her walk it off",4,false,"Do not encourage unnecessary exertion with suspected stroke signs.","Monitor, record timing and update Coastguard."),a("Wait before telling anyone",4,false,"Early communication helps onward care.","Monitor, record timing and update Coastguard.")],bigWhy:"Treat this casualty as Big Sick until assessed otherwise.",cardBody:"<p>Sudden face, arm and speech changes.</p>",cards:[a("Medical / Stroke guidance",6,true,"This best fits the main problem identified during assessment.","Use the medical or stroke-related guidance available locally."),a("External Bleed / Crush",6,false,"There is no major external bleeding here.","Use the medical or stroke-related guidance available locally."),a("Fractures",6,false,"The main problem is not a fracture.","Use the medical or stroke-related guidance available locally.")],learning:["Use DRCABC before narrowing the problem.","Recognise FAST-type stroke indicators.","Keep monitoring and escalate early.","Use the appropriate medical or stroke-related card guidance available locally."]}),
makePractice({name:"Conscious casualty after water inhalation",summary:"Coughing · cold · talking",task:["Adult casualty.","Recovered from water.","Coughing after inhaling water."],arrival:"They are sitting up, coughing and shivering. They can speak in short sentences.",findings:f("D","Safe enough. Wet/cold environment.")+f("R","Alert.")+f("A","Airway clear.")+f("B","28/min, coughing.")+f("C","Pale, cap refill 2 seconds."),assess:[a("Breathing concern after water inhalation",3,true,"Coughing, fast breathing and water inhalation make breathing the main concern.","Recognise breathing concern after water inhalation."),a("Fully recovered",3,false,"Talking does not mean there is no risk after water inhalation.","Recognise breathing concern after water inhalation."),a("Minor cut",3,false,"The main issue is breathing, not injury.","Recognise breathing concern after water inhalation.")],priorityBody:"<p>They remain cold and are still coughing.</p>",priority:[a("Monitor breathing, keep warm, update Coastguard",4,true,"Breathing after water inhalation can change, so repeat observations and communication matter.","Monitor breathing, keep warm and update Coastguard."),a("Leave them alone to rest",4,false,"They need ongoing observation.","Monitor breathing, keep warm and update Coastguard."),a("Assume coughing will settle",4,false,"Do not assume improvement without reassessment.","Monitor breathing, keep warm and update Coastguard.")],bigWhy:"Treat this casualty as Big Sick until assessed otherwise.",cardBody:"<p>Water inhalation with ongoing cough and raised breathing rate.</p>",cards:[a("Breathing Problems / Water Inhalation",6,true,"This best fits the main problem identified during assessment.","Use breathing problems / water inhalation guidance."),a("Fractures",6,false,"The main problem is breathing, not fracture.","Use breathing problems / water inhalation guidance."),a("Chest Pain",6,false,"Chest pain is not the main presentation.","Use breathing problems / water inhalation guidance.")],learning:["Start with DRCABC even if the casualty is talking.","Breathing problems can worsen after water inhalation.","Monitor breathing and colour closely.","Use the breathing problem / water inhalation card guidance."]}),
makePractice({name:"Head injury after a fall",summary:"Fall · scalp wound · headache",task:["Adult casualty.","Fell on steps near slipway.","Head injury reported."],arrival:"They are sitting, holding a cloth to their head. They have a headache.",findings:f("D","Safe enough. Fall mechanism.")+f("R","Alert.")+f("A","Airway clear.")+f("B","18/min.")+f("C","Small scalp bleed controlled.")+f("E","Headache, remembers falling."),assess:[a("Head injury",3,true,"The fall, scalp wound and headache make head injury the main problem.","Identify head injury and monitor for change."),a("Chest pain",3,false,"Chest pain is not the main presentation.","Identify head injury and monitor for change."),a("No further care",3,false,"Head injuries still need assessment and monitoring.","Identify head injury and monitor for change.")],priorityBody:"<p>The casualty remains alert with a headache.</p>",priority:[a("Monitor response, control bleeding, follow head injury guidance",4,true,"Head injuries can deteriorate, so response and symptoms should be monitored.","Monitor response and follow head injury guidance."),a("Ignore because they remember falling",4,false,"Memory of the fall does not remove the need to monitor.","Monitor response and follow head injury guidance."),a("Focus only on the cut",4,false,"The wound matters, but head injury monitoring is wider than bleeding control.","Monitor response and follow head injury guidance.")],bigWhy:"Treat this casualty as Big Sick until assessed otherwise.",cardBody:"<p>Head injury after a fall.</p>",cards:[a("Head Injury",6,true,"This is the most specific fit for the main problem.","Use head injury guidance."),a("Chest Pain",6,false,"Chest pain is not the main problem.","Use head injury guidance."),a("External Bleed / Crush",6,false,"Bleeding is controlled and not the main card focus.","Use head injury guidance.")],learning:["Assess systematically after a fall.","Look for changes in response, confusion and vomiting.","Head injury can deteriorate.","Use card-led care and continue reassessment."]}),
makePractice({name:"Open fracture with controlled bleeding",summary:"Visible deformity · bleeding controlled",task:["Male casualty.","Fell on rocks.","Lower leg deformity reported."],arrival:"He is lying still. There is a visible lower leg wound and deformity. Bleeding is controlled.",findings:f("D","Safe enough. Slip/fall mechanism.")+f("R","Alert.")+f("A","Airway clear.")+f("B","22/min.")+f("C","Bleeding controlled, cap refill 2 seconds.")+f("E","Open lower leg injury."),assess:[a("Open fracture with controlled bleeding",3,true,"The injury is open and deformed, but bleeding is currently controlled.","Identify the fracture while continuing observations."),a("Uncontrolled catastrophic bleed",3,false,"The bleeding is described as controlled.","Identify the fracture while continuing observations."),a("No significant injury",3,false,"An open deformity is significant.","Identify the fracture while continuing observations.")],priorityBody:"<p>Bleeding remains controlled and the limb is painful.</p>",priority:[a("Support/immobilise as guided, monitor circulation, follow fracture card",4,true,"Once severe bleeding is controlled, fracture care and circulation checks become the focus.","Follow fracture guidance and keep reassessing."),a("Walk the casualty out",4,false,"Avoid unnecessary movement of a painful open fracture.","Follow fracture guidance and keep reassessing."),a("Stop checking circulation",4,false,"Circulation checks remain important with limb injury.","Follow fracture guidance and keep reassessing.")],bigWhy:"Treat this casualty as Big Sick until assessed otherwise.",cardBody:"<p>Open lower leg injury with bleeding controlled.</p>",cards:[a("Card 6 — Fractures",6,true,"With bleeding controlled, fracture guidance is the best fit.","Card 6 — Fractures is the best fit."),a("Card 7 — Chest Pain",6,false,"Chest pain is not the presentation.","Card 6 — Fractures is the best fit."),a("Card 5 — Internal Bleed",6,false,"The main problem is an open limb injury, not internal bleeding.","Card 6 — Fractures is the best fit.")],learning:["Assess before focusing on the obvious injury.","Control bleeding and immobilise/support as guided.","Check for Big Sick signs.","Use fracture guidance when bleeding is controlled."]}),
makePractice({name:"Reduced responsiveness",summary:"Drowsy · breathing normally",task:["Adult casualty.","Found drowsy near beach café.","Cause unknown."],arrival:"They respond to voice but are very drowsy.",findings:f("D","Safe enough.")+f("R","Responds to voice.")+f("A","Airway clear for now.")+f("B","14/min, breathing normally.")+f("C","Cap refill 2 seconds.")+f("E","No obvious major injury."),assess:[a("Reduced responsiveness",3,true,"A reduced level of response is a serious finding even when breathing is currently normal.","Identify reduced responsiveness and keep reassessing."),a("Fully alert",3,false,"Responding to voice is not the same as being fully alert.","Identify reduced responsiveness and keep reassessing."),a("Minor injury only",3,false,"The key issue is response level, not a minor injury.","Identify reduced responsiveness and keep reassessing.")],priorityBody:"<p>They remain very drowsy but breathing normally.</p>",priority:[a("Monitor airway and breathing, update Coastguard, follow guidance",4,true,"Reduced response can affect airway and breathing, so repeat checks are essential.","Monitor airway and breathing, update Coastguard and follow guidance."),a("Leave them to sleep",4,false,"Drowsiness of unknown cause needs monitoring, not being left alone.","Monitor airway and breathing, update Coastguard and follow guidance."),a("Stop observations because breathing is normal",4,false,"Breathing can change if responsiveness reduces further.","Monitor airway and breathing, update Coastguard and follow guidance.")],bigWhy:"Treat this casualty as Big Sick until assessed otherwise.",cardBody:"<p>Reduced responsiveness with breathing currently normal.</p>",cards:[a("Reduced Response / Unconscious",6,true,"This best fits the response finding and need for ongoing airway and breathing checks.","Use reduced response / unconscious guidance."),a("Chest Pain",6,false,"Chest pain is not the presentation.","Use reduced response / unconscious guidance."),a("Fractures",6,false,"There is no fracture as the main problem.","Use reduced response / unconscious guidance.")],learning:["Reduced responsiveness is a serious finding.","Airway and breathing must be checked repeatedly.","Big Sick can be present even without obvious injury.","Use the appropriate unconscious/reduced response guidance."]})
];
function transition(){return{title:"2 minutes later...",transition:true,body:`<div class="transition"><b>2 minutes later...</b><p>The casualty's condition has changed.</p></div>`,question:"Reassess the casualty?",actions:[a("Reassess casualty",7,true,"Reassessment picks up changes in condition and guides the next action.","Reassess after any change.")]}}

const developingScenarios=[devFrom(2,{name:"Developing chest pain",summary:"Chest pain worsens after initial care",updated:f("Response","More anxious, starting to look confused.")+f("Breathing","30/min.")+f("Circulation","Pale and sweaty, cap refill 4 seconds.")+f("Pain","Chest pain worse."),wrong1:"Continue as before without updating",wrong1fb:"The condition has changed, so the response needs to change too.",wrong2:"Treat as Little Sick because he is talking",wrong2fb:"Talking does not rule out deterioration or Big Sick signs.",cardLead:"You have recognised deterioration and updated Coastguard.",keep:"Continue with the chest pain card and repeat observations.",learning:["Reassess when the casualty changes.","Recognise worsening circulation and confusion as deterioration.","Continue card-led care.","Escalate/update early when condition worsens."]}),devFrom(4,{name:"Developing water inhalation",summary:"Coughing casualty becomes breathless",updated:f("Response","Quieter, confused.")+f("Airway","Clear but coughing.")+f("Breathing","34/min, increased effort.")+f("Circulation","Colour worse, cool peripheries."),wrong1:"Reassure only",wrong1fb:"Reassurance helps, but worsening observations need reassessment and escalation.",wrong2:"Wait to see if coughing settles",wrong2fb:"Waiting risks missing worsening respiratory distress.",cardLead:"The casualty is now showing worsening breathing signs.",keep:"Continue breathing/water inhalation card guidance and repeat observations.",learning:["Repeat observations after water inhalation.","Recognise worsening breathing and colour.","Escalate when respiratory distress increases.","Continue the casualty care process rather than waiting."]}),devFrom(5,{name:"Developing head injury",summary:"Alert casualty becomes drowsier",updated:f("Response","More confused, repeating questions.")+f("Airway","Clear.")+f("Breathing","20/min.")+f("Circulation","Cap refill 2 seconds.")+f("AVPU","Becoming drowsier."),wrong1:"Assume they are tired",wrong1fb:"A change in response after head injury should not be dismissed.",wrong2:"Focus only on the scalp wound",wrong2fb:"The wound matters, but the changing level of response is now the priority.",cardLead:"The casualty is becoming less responsive.",keep:"Follow head injury/reduced response guidance and repeat observations.",learning:["Head injury needs repeated response checks.","Increasing confusion and drowsiness are deterioration signs.","Escalate/update early.","Continue card-led care and prepare for handover."]})];
const operationalScenarios=[{name:"Ten Second Triage",summary:"Multiple casualties · rapid prioritisation",learning:["Rapid triage is about immediate priority, not full treatment.","Look for the casualty who needs attention first.","Unresponsive/not breathing normally is highest priority in this prototype.","Use this as a proof of concept for operational decision practice."],screens:[{title:"Operational tasking",body:task(["Multiple casualties reported near the shoreline.","Three casualties are in front of you.","Identify who needs immediate attention first."]),question:"",actions:[a("Start rapid assessment",1,true,"You begin rapid assessment.","Start rapid assessment of all casualties.")]},{title:"Rapid assessment",body:`<p>Three casualties are presented.</p><div class="casualty-card"><b>Casualty A</b><br>Walking wounded. Minor arm cut. Talking clearly.</div><div class="casualty-card"><b>Casualty B</b><br>On the ground. Not responding. Not breathing normally.</div><div class="casualty-card"><b>Casualty C</b><br>Sitting up. Cold and coughing. Breathing fast but talking.</div>`,question:"Who needs immediate attention first?",actions:[a("Casualty A",2,false,"Casualty A is talking and walking, so they are not the first priority in this set.","Casualty B needs immediate attention first because they are unresponsive and not breathing normally."),a("Casualty B",2,true,"Casualty B is unresponsive and not breathing normally, so they need immediate attention first.","Casualty B needs immediate attention first."),a("Casualty C",2,false,"Casualty C needs assessment and monitoring, but they are talking and breathing.","Casualty B needs immediate attention first because they are unresponsive and not breathing normally.")]},{title:"Immediate priority",body:`<p>Casualty B has been identified as the immediate priority.</p>`,question:"What should happen now?",actions:[a("Allocate help and begin immediate life-saving care",3,true,"Once the priority casualty is identified, allocate roles and start immediate care without losing sight of the wider scene.","Allocate help and begin immediate life-saving care."),a("Fully assess Casualty A first",3,false,"A full assessment of a lower-priority casualty delays immediate care.","Allocate help and begin immediate life-saving care for Casualty B."),a("Ignore the other casualties completely",3,false,"The immediate priority needs care, but the wider scene still needs managing.","Allocate help and begin immediate care while maintaining scene awareness.")]},review()] }];
const scenarioGroups={practice:practiceScenarios,developing:developingScenarios,operational:operationalScenarios};
function loadCompleted(){try{const s=JSON.parse(sessionStorage.getItem("ccsCompletedV12")||"[]");return Array.isArray(s)?s:[]}catch(e){return[]}}function saveCompleted(){sessionStorage.setItem("ccsCompletedV12",JSON.stringify(completed))}function key(m=currentMode,i=scenarioIndex){return`${m}-${i}`}function done(m,i){return completed.includes(key(m,i))}function markDone(){if(!done(currentMode,scenarioIndex)){completed.push(key());saveCompleted()}}function resetProgress(){completed=[];saveCompleted();renderMenu();scrollTop()}function allKeys(){return Object.keys(scenarioGroups).flatMap(m=>scenarioGroups[m].map((_,i)=>`${m}-${i}`))}function totalDone(){return allKeys().filter(k=>completed.includes(k)).length}function incomplete(m){return scenarioGroups[m].map((_,i)=>i).filter(i=>!done(m,i))}function screens(){return scenarioGroups[currentMode][scenarioIndex].screens}function sc(){return scenarioGroups[currentMode][scenarioIndex]}function scrollTop(){window.scrollTo({top:0,behavior:"smooth"})}
function modeCard(m,title,body,buttonText){
  return `<div class="choice-card"><h3>${title}</h3><p class="small">${body}</p><div class="actions"><button class="primary" onclick="renderScenarioList('${m}')">${buttonText}</button></div></div>`;
}
function scenarioCard(m,i){
  const s=scenarioGroups[m][i];
  return `<div class="choice-card"><h3>${s.name} <span class="${done(m,i)?'tick':'small'}">${done(m,i)?'✓':''}</span></h3><p class="small">${s.summary}</p><div class="actions"><button class="primary" onclick="startScenario('${m}',${i})">Start</button></div></div>`;
}
function randomCard(m,label){
  return `<div class="choice-card"><h3>Random ${label}</h3><p class="small">Start a random scenario from this section.</p><div class="actions"><button class="primary" onclick="startRandom('${m}')">Start</button></div></div>`;
}
function renderMenu(){
  attemptLog={};
  document.getElementById("stepText").textContent=totalDone()+" completed";
  document.getElementById("scenarioText").textContent="Choose mode";
  document.getElementById("bar").style.width=Math.round((totalDone()/allKeys().length)*100)+"%";
  let html=`<h2>How would you like to practise?</h2>`;
  html+=modeCard("practice","Practice Scenarios","Short static scenarios. Build familiarity with the casualty care process and cards.","Start Practice");
  html+=modeCard("developing","Developing Scenarios","Casualties change over time. Practise reassessment and adapting to new information.","Start Developing");
  html+=modeCard("operational","Operational Scenarios (Prototype)","Rapid operational decision-making exercises.","Start Operational");
  if(totalDone())html+=`<div class="actions"><button class="secondary" onclick="resetProgress()">Reset progress</button></div>`;
  document.getElementById("app").innerHTML=html;
}
function renderScenarioList(m){
  attemptLog={};
  currentMode=m;
  const title=m==="practice"?"Practice Scenarios":m==="developing"?"Developing Scenarios":"Operational Scenarios (Prototype)";
  const randomLabel=m==="practice"?"Practice":m==="developing"?"Developing":"Operational";
  document.getElementById("stepText").textContent=totalDone()+" completed";
  document.getElementById("scenarioText").textContent=title;
  document.getElementById("bar").style.width=Math.round((totalDone()/allKeys().length)*100)+"%";
  let html=`<h2>${title}</h2>`;
  html+=`<div class="actions"><button class="secondary" onclick="renderMenu()">Back</button></div>`;
  if(scenarioGroups[m].length>1 || m==="operational")html+=randomCard(m,randomLabel);
  scenarioGroups[m].forEach((s,i)=>{html+=scenarioCard(m,i)});
  document.getElementById("app").innerHTML=html;
  scrollTop();
}
function startRandom(m){let a=incomplete(m);if(!a.length)a=scenarioGroups[m].map((_,i)=>i);startScenario(m,a[Math.floor(Math.random()*a.length)])}
function startScenario(m,i){currentMode=m;scenarioIndex=i;step=0;attemptLog={};render();scrollTop()}
function render(){let ss=screens(),s=ss[step],onReview=step===ss.length-1;if(onReview)markDone();document.getElementById("stepText").textContent="Step "+(step+1)+" of "+ss.length;document.getElementById("scenarioText").textContent=modeLabels[currentMode]+" · Scenario "+(scenarioIndex+1)+(done(currentMode,scenarioIndex)?" ✓":"");document.getElementById("bar").style.width=Math.round((step/(ss.length-1))*100)+"%";let html=`<h2>${s.title}</h2>`;if(onReview)html+=reviewHtml();else{html+=s.body;if(s.question)html+=`<p class="question">${s.question}</p>`;html+=`<div class="actions">`;s.actions.forEach((act,i)=>html+=`<button onclick="choose(${i})" class="answer ${step===0||s.transition?'primary':''}">${act.text}</button>`);html+=`</div><div id="feedback" class="feedback"></div><div id="continue" class="continue"></div>`}document.getElementById("app").innerHTML=html}
function reviewHtml(){let ss=screens(),dec=ss.map((s,i)=>i).filter(i=>i>0&&i<ss.length-1&&ss[i].actions&&ss[i].actions.length>1),cf=dec.filter(i=>attemptLog[i]===true).length,corr=dec.filter(i=>attemptLog[i]===false).length,s=sc();let html=`<div class="review-banner"><b>Scenario complete.</b><br>${s.name}</div><div class="score-grid"><div class="score-box"><b>${cf}/${dec.length}</b><span class="small">Correct first time</span></div><div class="score-box"><b>${corr}</b><span class="small">Required correction</span></div></div><p class="question">Key learning points</p><ul>`;s.learning.forEach(l=>html+=`<li>${l}</li>`);html+=`</ul><div class="actions">`;if(currentMode==="practice")html+=`<button onclick="startRandom('practice')" class="primary">Try random practice scenario</button>`;else if(currentMode==="developing")html+=`<button onclick="startRandom('developing')" class="primary">Try random developing scenario</button>`;else html+=`<button onclick="startScenario('operational',0)" class="primary">Restart triage prototype</button>`;return html+`<button onclick="restartScenario()" class="secondary">Restart scenario</button><button onclick="renderMenu()" class="secondary">Back to start</button></div>`}
function choose(i){let ss=screens(),s=ss[step],chosen=s.actions[i],next=chosen.next;if((step===0||s.transition)&&s.actions.length===1){step=next;render();scrollTop();return}if(attemptLog[step]===undefined)attemptLog[step]=!!chosen.correct;let ci=s.actions.findIndex(x=>x.correct);document.querySelectorAll("button.answer").forEach((b,idx)=>{b.disabled=true;b.classList.remove("primary");if(idx===i)b.classList.add("selected");if(idx===ci)b.classList.add("correct");if(idx===i&&!chosen.correct)b.classList.add("incorrect");if(idx!==i&&idx!==ci)b.classList.add("muted")});let fb=document.getElementById("feedback");fb.className="feedback show "+(chosen.correct?"good":"warn");fb.innerHTML=chosen.correct?`<b>Good decision.</b> ${chosen.feedback}`:`<b>Prompt.</b> ${chosen.feedback}<br><br><b>Correct pathway:</b> ${s.actions[ci].correctWhy}`;document.getElementById("continue").innerHTML=`<button class="primary" onclick="go(${next})">Continue</button>`}
function restartScenario(){step=0;attemptLog={};render();scrollTop()}function go(n){step=n;render();scrollTop()}renderMenu();
</script></body></html>
