<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Casualty Care Simulator V10</title>
<style>
:root{
  --navy:#003B5C;
  --yellow:#FFD100;
  --bg:#eef4f8;
  --paper:#fff;
  --ink:#10242f;
  --muted:#657684;
  --line:#d3e0e8;
  --good:#057a55;
  --good-bg:#ecfdf3;
  --warn:#b54708;
  --warn-bg:#fffaeb;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
}
header{
  background:var(--navy);
  color:white;
  padding:12px 14px;
  border-bottom:6px solid var(--yellow);
}
header h1{
  margin:0;
  font-size:1.05rem;
  line-height:1.2;
}
header p{
  margin:3px 0 0;
  font-size:.76rem;
  color:#d5e7f0;
}
main{
  max-width:680px;
  margin:0 auto;
  padding:10px;
}
.status{
  background:white;
  border:1px solid var(--line);
  border-radius:12px;
  padding:9px 10px;
  margin:8px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  font-size:.86rem;
}
.progress{
  height:7px;
  background:#d9e7ee;
  border-radius:999px;
  overflow:hidden;
  margin-top:7px;
}
.bar{
  height:100%;
  width:0;
  background:var(--yellow);
  transition:width .2s ease;
}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:16px;
  padding:15px;
  box-shadow:0 8px 22px rgba(0,59,92,.12);
}
h2{
  margin:0 0 10px;
  color:var(--navy);
  font-size:1.25rem;
}
p{
  margin:8px 0;
  line-height:1.38;
}
.scenario{
  background:#fff9d8;
  border-left:5px solid var(--yellow);
  border-radius:12px;
  padding:10px;
  margin:10px 0;
}
.findings{
  display:grid;
  gap:7px;
  margin:10px 0;
}
.finding{
  border:1px solid var(--line);
  background:#f7fafc;
  border-radius:10px;
  padding:9px 10px;
}
.finding b{color:var(--navy)}
.question{
  font-weight:850;
  margin-top:12px;
}
.actions{
  display:grid;
  gap:8px;
  margin-top:12px;
}
button{
  width:100%;
  padding:12px 11px;
  border-radius:11px;
  border:1px solid #c9dbe6;
  background:#edf5fa;
  color:var(--ink);
  font-size:.94rem;
  font-weight:750;
  cursor:pointer;
  text-align:left;
}
button.primary{
  background:var(--navy);
  color:white;
  border-color:var(--navy);
  text-align:center;
}
button.secondary{
  background:white;
  text-align:center;
}
button:disabled{opacity:.72;cursor:default}
.feedback{
  display:none;
  margin-top:12px;
  border-radius:12px;
  padding:11px;
  font-size:.91rem;
  border:1px solid var(--line);
}
.feedback.show{display:block}
.feedback.good{
  background:var(--good-bg);
  border-color:#abefc6;
  color:#064e3b;
}
.feedback.warn{
  background:var(--warn-bg);
  border-color:#fedf89;
  color:#7a2e0e;
}
.continue{
  display:grid;
  gap:8px;
  margin-top:10px;
}
.small{
  color:var(--muted);
  font-size:.84rem;
}
ul{padding-left:20px;margin:8px 0}
li{margin:6px 0}
.completion{
  display:grid;
  gap:7px;
  margin:10px 0;
}
.completion-row{
  border:1px solid var(--line);
  background:#f7fafc;
  border-radius:10px;
  padding:9px 10px;
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.tick{color:var(--good);font-weight:850}
@media(max-width:600px){
  header{position:sticky;top:0;z-index:5}
  main{padding:8px}
  .card{padding:13px}
  h2{font-size:1.16rem}
  button{font-size:.9rem;padding:11px 10px}
}
</style>
</head>
<body>
<header>
  <h1>Casualty Care Simulator</h1>
  <p>Prototype V10 · Supplementary practice tool</p>
</header>

<main>
  <div class="status">
    <span id="stepText">Ready</span>
    <span id="scenarioText" class="small">Random scenario</span>
  </div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div class="card" id="app"></div>
</main>

<script>
let mode = "menu";
let scenarioIndex = 0;
let step = 0;
let completed = loadCompleted();

const scenarios = [
  {
    name:"External bleed",
    summary:"Slip on rocks · heavy lower leg bleed",
    screens:[
      {
        title:"Tasking",
        body:`
          <div class="scenario">
            <p><b>Situation</b></p>
            <p>Male, 50s.</p>
            <p>Slipped on rocks.</p>
            <p>Reported injured.</p>
          </div>
        `,
        question:"Proceed to casualty?",
        actions:[["Proceed",1,true,"You approach the casualty."]]
      },
      {
        title:"Arrival",
        body:`<p>He is sitting on rocks, holding his lower left leg. He appears distressed.</p>`,
        question:"What do you do first?",
        actions:[
          ["Start DRCABC assessment",2,true,"Correct. Start structured."],
          ["Select a casualty care card",2,false,"Assess first, then use the relevant card."],
          ["Treat the leg injury",2,false,"Start with assessment so you do not miss more serious problems."]
        ]
      },
      {
        title:"Assessment",
        body:`
          <p>You perform DRCABC.</p>
          <div class="findings">
            <div class="finding"><b>D</b> Safe enough. Slip on rocks.</div>
            <div class="finding"><b>R</b> Alert.</div>
            <div class="finding"><b>C</b> Heavy lower leg bleed.</div>
            <div class="finding"><b>A</b> Clear.</div>
            <div class="finding"><b>B</b> 36/min.</div>
            <div class="finding"><b>C</b> Central cap refill 4 seconds.</div>
          </div>
        `,
        question:"What is your immediate priority?",
        actions:[
          ["Control the life-threatening bleed",3,true,"Correct. Bleeding comes first."],
          ["Ask SAMPLE questions",3,false,"Useful later. Bleed control first."],
          ["Give pain relief",3,false,"Pain matters, but bleeding comes first."],
          ["Look for the right card before acting",3,false,"Do not delay immediate bleed control."]
        ]
      },
      {
        title:"Immediate priority",
        body:`<p>You apply direct pressure and a trauma dressing. Bleeding continues heavily.</p>`,
        question:"What next?",
        actions:[
          ["Apply a tourniquet and note the time",4,true,"Correct. Escalate bleed control."],
          ["Release pressure and reassess",4,false,"Do not release pressure unnecessarily."],
          ["Move straight to evacuation",4,false,"Bleeding still needs controlling."],
          ["Give Entonox",4,false,"Not while bleeding remains uncontrolled."]
        ]
      },
      {
        title:"Big Sick / Little Sick",
        body:`
          <p>Bleeding is now controlled.</p>
          <div class="findings">
            <div class="finding"><b>Response</b> Alert.</div>
            <div class="finding"><b>Breathing</b> 36/min.</div>
            <div class="finding"><b>Central cap refill</b> 4 seconds.</div>
          </div>
        `,
        question:"Big Sick or Little Sick?",
        actions:[
          ["Big Sick",5,true,"Correct. Breathing 30+ and cap refill 3+ are Big Sick indicators."],
          ["Little Sick",5,false,"Alert does not rule out Big Sick."]
        ]
      },
      {
        title:"Card selection",
        body:`<p>External limb bleed controlled. Casualty is Big Sick.</p>`,
        question:"Which card best fits?",
        actions:[
          ["Card 4 — External Bleed / Crush",6,true,"Correct."],
          ["Card 5 — Internal Bleed",6,false,"The main problem is visible external bleeding."],
          ["Card 6 — Fractures",6,false,"There may be a fracture, but bleeding is the card focus."]
        ]
      },
      {
        title:"Review",
        body:`
          <p><b>Scenario complete.</b></p>
          <ul>
            <li>DRCABC first.</li>
            <li>Control life-threatening bleeding.</li>
            <li>Recognise Big Sick.</li>
            <li>Select the relevant card.</li>
          </ul>
        `,
        question:"",
        actions:[["Try another random scenario",0,true,""],["Restart scenario",0,true,""]]
      }
    ]
  },
  {
    name:"Unconscious from water",
    summary:"Pulled from water · not responding",
    screens:[
      {
        title:"Tasking",
        body:`
          <div class="scenario">
            <p><b>Situation</b></p>
            <p>Adult casualty.</p>
            <p>Pulled from water.</p>
            <p>Reported unconscious.</p>
          </div>
        `,
        question:"Proceed to casualty?",
        actions:[["Proceed",1,true,"You approach the casualty."]]
      },
      {
        title:"Arrival",
        body:`<p>The casualty is on the beach. Bystanders are nearby. They are not moving.</p>`,
        question:"What do you do first?",
        actions:[
          ["Check danger and response",2,true,"Correct. Start DRCABC."],
          ["Start chest compressions immediately",2,false,"Check response and breathing first."],
          ["Look for a drowning card",2,false,"Assess first, then use the card."]
        ]
      },
      {
        title:"Assessment",
        body:`
          <p>You perform DRCABC.</p>
          <div class="findings">
            <div class="finding"><b>D</b> Safe enough. Wet/cold environment.</div>
            <div class="finding"><b>R</b> No response.</div>
            <div class="finding"><b>A</b> Airway opened.</div>
            <div class="finding"><b>B</b> Not breathing normally.</div>
            <div class="finding"><b>C</b> No signs of life.</div>
          </div>
        `,
        question:"What is your immediate priority?",
        actions:[
          ["Begin resuscitation and call for AED",3,true,"Correct. Not breathing normally means resuscitation now."],
          ["Put them in recovery position",3,false,"Only if breathing normally."],
          ["Ask bystanders what happened",3,false,"Useful, but resuscitation comes first."],
          ["Warm them up first",3,false,"Prevent heat loss, but do not delay resuscitation."]
        ]
      },
      {
        title:"Immediate priority",
        body:`<p>CPR is underway. AED is on its way. Crew are available.</p>`,
        question:"What helps most now?",
        actions:[
          ["Clear roles: CPR, AED, comms, kit",4,true,"Correct. Allocate tasks early."],
          ["Everyone reads the card together",4,false,"One person can check the card. Roles still need assigning."],
          ["Move the casualty first",4,false,"Do not interrupt CPR unless needed for safety."],
          ["Wait for paramedics",4,false,"Continue immediate care."]
        ]
      },
      {
        title:"Big Sick / Little Sick",
        body:`
          <div class="findings">
            <div class="finding"><b>Response</b> Unresponsive.</div>
            <div class="finding"><b>Breathing</b> Not normal.</div>
            <div class="finding"><b>Circulation</b> No signs of life.</div>
          </div>
        `,
        question:"Big Sick or Little Sick?",
        actions:[
          ["Big Sick",5,true,"Correct. This is immediately life-threatening."],
          ["Little Sick",5,false,"Unresponsive and not breathing normally is Big Sick."]
        ]
      },
      {
        title:"Card selection",
        body:`<p>Unconscious casualty pulled from water. Not breathing normally.</p>`,
        question:"Which card best fits?",
        actions:[
          ["Card 2 — Not Breathing / CPR",6,true,"Correct."],
          ["Card 3 — Breathing Problems",6,false,"They are not breathing normally; CPR card fits best."],
          ["Card 8 — Hypothermia",6,false,"Cold matters, but CPR is the priority."]
        ]
      },
      {
        title:"Review",
        body:`
          <p><b>Scenario complete.</b></p>
          <ul>
            <li>Check response and breathing.</li>
            <li>Start resuscitation when not breathing normally.</li>
            <li>Assign roles early.</li>
            <li>Use the CPR card.</li>
          </ul>
        `,
        question:"",
        actions:[["Try another random scenario",0,true,""],["Restart scenario",0,true,""]]
      }
    ]
  },
  {
    name:"Chest pain on ILB",
    summary:"Afloat · pale, sweaty, chest pain",
    screens:[
      {
        title:"Tasking",
        body:`
          <div class="scenario">
            <p><b>Situation</b></p>
            <p>Male, 60s.</p>
            <p>Onboard casualty vessel.</p>
            <p>Chest pain reported.</p>
          </div>
        `,
        question:"Proceed to casualty?",
        actions:[["Proceed",1,true,"You approach the casualty."]]
      },
      {
        title:"Arrival",
        body:`<p>He is seated, pale and sweaty. He says his chest feels tight.</p>`,
        question:"What do you do first?",
        actions:[
          ["Start DRCABC assessment",2,true,"Correct. Start structured."],
          ["Ask for medication first",2,false,"Important, but assess first."],
          ["Stand him up and walk him out",2,false,"Keep him still and assess."],
          ["Select a card",2,false,"Assess first, then use the relevant card."]
        ]
      },
      {
        title:"Assessment",
        body:`
          <p>You perform DRCABC.</p>
          <div class="findings">
            <div class="finding"><b>D</b> Boat made safe enough.</div>
            <div class="finding"><b>R</b> Alert but anxious.</div>
            <div class="finding"><b>A</b> Clear.</div>
            <div class="finding"><b>B</b> 24/min.</div>
            <div class="finding"><b>C</b> Pale, sweaty. Central cap refill 3 seconds.</div>
            <div class="finding"><b>Pain</b> Central chest tightness.</div>
          </div>
        `,
        question:"What is your immediate priority?",
        actions:[
          ["Rest, reassure, monitor, update Coastguard",3,true,"Correct. Treat as serious and minimise exertion."],
          ["Get him walking to the lifeboat",3,false,"Avoid exertion."],
          ["Focus on seasickness",3,false,"Chest pain with pale/sweaty presentation is higher risk."],
          ["Leave him while you prepare kit",3,false,"Keep monitoring and communicate."]
        ]
      },
      {
        title:"Immediate priority",
        body:`<p>He remains pale and sweaty. Pain is still present.</p>`,
        question:"What next?",
        actions:[
          ["Check own GTN/aspirin and follow card",4,true,"Correct. Use medication only within guidance."],
          ["Give any painkiller available",4,false,"Use the card and permitted medication guidance."],
          ["Tell him to lie flat",4,false,"Position of comfort is better unless condition changes."],
          ["Delay update until ashore",4,false,"Early update helps onward care."]
        ]
      },
      {
        title:"Big Sick / Little Sick",
        body:`
          <div class="findings">
            <div class="finding"><b>Response</b> Alert.</div>
            <div class="finding"><b>Breathing</b> 24/min.</div>
            <div class="finding"><b>Circulation</b> Pale, sweaty, cap refill 3 seconds.</div>
            <div class="finding"><b>Pain</b> Ongoing chest tightness.</div>
          </div>
        `,
        question:"Big Sick or Little Sick?",
        actions:[
          ["Big Sick",5,true,"Correct. Chest pain plus poor circulation signs is Big Sick."],
          ["Little Sick",5,false,"Alert does not make this low risk."]
        ]
      },
      {
        title:"Card selection",
        body:`<p>Ongoing chest pain with pale, sweaty presentation.</p>`,
        question:"Which card best fits?",
        actions:[
          ["Card 7 — Chest Pain",6,true,"Correct."],
          ["Card 3 — Breathing Problems",6,false,"Breathing is raised, but chest pain is the main problem."],
          ["Card 10 — Medical Illness",6,false,"Use the more specific chest pain card."]
        ]
      },
      {
        title:"Review",
        body:`
          <p><b>Scenario complete.</b></p>
          <ul>
            <li>DRCABC first.</li>
            <li>Minimise exertion.</li>
            <li>Recognise chest pain red flags.</li>
            <li>Use the chest pain card.</li>
          </ul>
        `,
        question:"",
        actions:[["Try another random scenario",0,true,""],["Restart scenario",0,true,""]]
      }
    ]
  }
];


function loadCompleted(){
  try{
    const saved = JSON.parse(sessionStorage.getItem("ccsCompleted") || "[]");
    return Array.isArray(saved) ? saved : [];
  }catch(e){
    return [];
  }
}

function saveCompleted(){
  sessionStorage.setItem("ccsCompleted", JSON.stringify(completed));
}

function markCompleted(i){
  if(!completed.includes(i)){
    completed.push(i);
    saveCompleted();
  }
}

function resetProgress(){
  completed = [];
  saveCompleted();
  renderMenu();
  window.scrollTo({top:0,behavior:"smooth"});
}

function incompleteScenarioIndexes(){
  return scenarios.map((_,i)=>i).filter(i=>!completed.includes(i));
}

function completedCount(){
  return completed.length;
}

function completionList(){
  return `<div class="completion">` + scenarios.map((sc,i)=>{
    const done = completed.includes(i);
    return `<div class="completion-row"><span>Scenario ${i+1}</span><span class="${done ? 'tick' : 'small'}">${done ? '✓ Completed' : 'Not completed'}</span></div>`;
  }).join("") + `</div>`;
}

function currentScreens(){ return scenarios[scenarioIndex].screens; }

function renderMenu(){
  mode = "menu";
  const left = scenarios.length - completedCount();
  document.getElementById("stepText").textContent = completedCount() + " of " + scenarios.length + " completed";
  document.getElementById("scenarioText").textContent = left ? "Random scenario" : "Complete";
  document.getElementById("bar").style.width = Math.round((completedCount()/scenarios.length)*100) + "%";

  let html = `<h2>Casualty care practice</h2>`;
  html += completionList();
  html += `<div class="actions">`;
  if(left){
    html += `<button class="primary" onclick="startRandomScenario()">Start random scenario</button>`;
  }else{
    html += `<button class="primary" onclick="resetProgress()">Reset progress</button>`;
  }
  html += `</div>`;
  document.getElementById("app").innerHTML = html;
}

function startRandomScenario(){
  const available = incompleteScenarioIndexes();
  if(!available.length){
    renderMenu();
    return;
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  startScenario(pick);
}

function startScenario(i){
  scenarioIndex = i;
  step = 0;
  mode = "scenario";
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function render(){
  const screens = currentScreens();
  const s = screens[step];
  const onReview = step === screens.length - 1;
  if(onReview){ markCompleted(scenarioIndex); }

  document.getElementById("stepText").textContent = "Step " + (step + 1) + " of " + screens.length;
  document.getElementById("scenarioText").textContent = "Scenario " + (scenarioIndex + 1) + (completed.includes(scenarioIndex) ? " ✓" : "");
  document.getElementById("bar").style.width = Math.round((step/(screens.length-1))*100) + "%";

  let html = `<h2>${s.title}</h2>${s.body}`;
  if(onReview){
    html += completionList();
    if(completedCount() === scenarios.length){
      html += `<p class="question">All scenarios completed.</p>`;
    }
  }
  if(s.question){ html += `<p class="question">${s.question}</p>`; }
  html += `<div class="actions">`;

  if(onReview){
    if(incompleteScenarioIndexes().length){
      html += `<button onclick="tryAnother()" class="primary">Try another random scenario</button>`;
    }else{
      html += `<button onclick="resetProgress()" class="primary">Reset progress</button>`;
    }
    html += `<button onclick="restartScenario()" class="secondary">Restart scenario</button>`;
    html += `<button onclick="renderMenu()" class="secondary">Back to start</button>`;
  }else{
    s.actions.forEach((a,i)=>{
      html += `<button onclick="choose(${i})" class="${step===0 ? 'primary' : ''}">${a[0]}</button>`;
    });
  }

  html += `</div><div id="feedback" class="feedback"></div><div id="continue" class="continue"></div>`;
  document.getElementById("app").innerHTML = html;
}

function choose(i){
  const screens = currentScreens();
  const a = screens[step].actions[i];
  const next = a[1];
  const correct = a[2];
  const feedback = a[3];

  if(step === 0){
    step = next;
    render();
    window.scrollTo({top:0,behavior:"smooth"});
    return;
  }

  document.querySelectorAll("button").forEach(b=>b.disabled=true);
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "good" : "warn");
  fb.innerHTML = `<b>${correct ? "Good decision." : "Prompt."}</b> ${feedback}`;
  document.getElementById("continue").innerHTML = `<button class="primary" onclick="go(${next})">Continue</button>`;
}

function tryAnother(){
  startRandomScenario();
}

function restartScenario(){
  step = 0;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function go(next){
  step = next;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

renderMenu();
</script>
</body>
</html>
