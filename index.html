<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Casualty Care Simulator V11</title>
<style>
:root{
  --navy:#003B5C; --yellow:#FFD100; --bg:#eef4f8; --paper:#fff; --ink:#10242f;
  --muted:#657684; --line:#d3e0e8; --good:#057a55; --good-bg:#ecfdf3;
  --warn:#b54708; --warn-bg:#fffaeb; --bad:#b42318; --bad-bg:#fef3f2;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--navy);color:white;padding:12px 14px;border-bottom:6px solid var(--yellow)}
header h1{margin:0;font-size:1.05rem;line-height:1.2} header p{margin:3px 0 0;font-size:.76rem;color:#d5e7f0}
main{max-width:680px;margin:0 auto;padding:10px}.status{background:white;border:1px solid var(--line);border-radius:12px;padding:9px 10px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:.86rem}.progress{height:7px;background:#d9e7ee;border-radius:999px;overflow:hidden;margin-top:7px}.bar{height:100%;width:0;background:var(--yellow);transition:width .2s ease}.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:0 8px 22px rgba(0,59,92,.12)}
h2{margin:0 0 10px;color:var(--navy);font-size:1.25rem} p{margin:8px 0;line-height:1.38}.scenario{background:#fff9d8;border-left:5px solid var(--yellow);border-radius:12px;padding:10px;margin:10px 0}.findings{display:grid;gap:7px;margin:10px 0}.finding{border:1px solid var(--line);background:#f7fafc;border-radius:10px;padding:9px 10px}.finding b{color:var(--navy)}.question{font-weight:850;margin-top:12px}.actions{display:grid;gap:8px;margin-top:12px}
button{width:100%;padding:12px 11px;border-radius:11px;border:1px solid #c9dbe6;background:#edf5fa;color:var(--ink);font-size:.94rem;font-weight:750;cursor:pointer;text-align:left}button.primary{background:var(--navy);color:white;border-color:var(--navy);text-align:center}button.secondary{background:white;text-align:center}button:disabled{cursor:default}.answer.correct{background:var(--good-bg);border-color:#32d583;color:#064e3b}.answer.incorrect{background:var(--bad-bg);border-color:#f97066;color:#7a271a}.answer.muted{opacity:.45;background:#f6f8fa}.answer.selected::before{content:"Your answer: ";font-weight:850}.answer.correct:not(.selected)::before{content:"Correct answer: ";font-weight:850}.answer.correct.selected::before{content:"Correct: ";font-weight:850}
.feedback{display:none;margin-top:12px;border-radius:12px;padding:11px;font-size:.91rem;border:1px solid var(--line)}.feedback.show{display:block}.feedback.good{background:var(--good-bg);border-color:#abefc6;color:#064e3b}.feedback.warn{background:var(--warn-bg);border-color:#fedf89;color:#7a2e0e}.continue{display:grid;gap:8px;margin-top:10px}.small{color:var(--muted);font-size:.84rem}ul{padding-left:20px;margin:8px 0}li{margin:6px 0}.completion{display:grid;gap:7px;margin:10px 0}.completion-row{border:1px solid var(--line);background:#f7fafc;border-radius:10px;padding:9px 10px;display:flex;justify-content:space-between;gap:10px}.tick{color:var(--good);font-weight:850}.review-banner{background:var(--good-bg);border:1px solid #abefc6;border-radius:12px;padding:12px;margin:10px 0;color:#064e3b}.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.score-box{border:1px solid var(--line);border-radius:12px;background:#f7fafc;padding:10px;text-align:center}.score-box b{display:block;font-size:1.35rem;color:var(--navy)}
@media(max-width:600px){header{position:sticky;top:0;z-index:5}main{padding:8px}.card{padding:13px}h2{font-size:1.16rem}button{font-size:.9rem;padding:11px 10px}}
</style>
</head>
<body>
<header><h1>Casualty Care Simulator</h1><p>Prototype V11 · Supplementary practice tool</p></header>
<main><div class="status"><span id="stepText">Ready</span><span id="scenarioText" class="small">Practice</span></div><div class="progress"><div id="bar" class="bar"></div></div><div class="card" id="app"></div></main>
<script>
let mode="menu", scenarioIndex=0, step=0, completed=loadCompleted(), attemptLog={};
const scenarios=[
{name:"External Bleed",summary:"Slip on rocks · heavy lower leg bleed",learning:["Start with DRCABC.","Control life-threatening bleeding before moving on.","Breathing 30+ and central cap refill 3+ indicate Big Sick.","Select the external bleed card when visible bleeding is the main problem."],screens:[
{title:"Tasking",body:`<div class="scenario"><p><b>Situation</b></p><p>Male, 50s.</p><p>Slipped on rocks.</p><p>Reported injured.</p></div>`,question:"",actions:[a("Proceed to casualty",1,true,"You approach the casualty.","Proceed to casualty so you can make an initial assessment.")]},
{title:"Arrival",body:`<p>He is sitting on rocks, holding his lower left leg. He appears distressed.</p>`,question:"What do you do first?",actions:[a("Start DRCABC assessment",2,true,"A structured first assessment reduces the chance of missing a life-threatening problem.","Start DRCABC before focusing on the obvious injury or selecting a card."),a("Select a casualty care card",2,false,"Cards support care after assessment, but they should not replace the initial DRCABC check.","Start DRCABC first so the casualty is assessed in a safe, structured order."),a("Treat the leg injury",2,false,"The leg injury is obvious, but assessment comes first so more serious problems are not missed.","Start DRCABC first, then treat the priority problem found during assessment.")]},
{title:"Assessment",body:`<p>You perform DRCABC.</p><div class="findings"><div class="finding"><b>D –</b> Safe enough. Slip on rocks.</div><div class="finding"><b>R –</b> Alert.</div><div class="finding"><b>C –</b> Heavy lower leg bleed.</div><div class="finding"><b>A –</b> Airway clear.</div><div class="finding"><b>B –</b> 36/min.</div><div class="finding"><b>C –</b> Central cap refill 4 seconds.</div></div>`,question:"What is your immediate priority?",actions:[a("Control the life-threatening bleed",3,true,"Life-threatening external bleeding is an immediate priority and should be controlled before lower-priority history taking or pain relief.","Control the life-threatening bleed first."),a("Ask SAMPLE questions",3,false,"SAMPLE can help later, but it should not delay treatment of heavy bleeding.","Control the life-threatening bleed first."),a("Give pain relief",3,false,"Pain relief matters, but uncontrolled heavy bleeding is the immediate threat.","Control the life-threatening bleed first."),a("Look for the right card before acting",3,false,"Cards are useful, but immediate bleed control should not be delayed.","Control the life-threatening bleed first.")]},
{title:"Immediate priority",body:`<p>You apply direct pressure and a trauma dressing. Bleeding continues heavily.</p>`,question:"What next?",actions:[a("Apply a tourniquet and note the time",4,true,"If heavy limb bleeding continues despite pressure and dressing, escalate bleed control and record the tourniquet time.","Apply a tourniquet and note the time."),a("Release pressure and reassess",4,false,"Releasing pressure unnecessarily risks worsening the bleed.","Apply a tourniquet and note the time."),a("Move straight to evacuation",4,false,"Evacuation matters, but the bleed still needs controlling before moving on.","Apply a tourniquet and note the time."),a("Give Entonox",4,false,"Pain relief should not come before controlling ongoing heavy bleeding.","Apply a tourniquet and note the time.")]},
{title:"Big Sick / Little Sick",body:`<p>Bleeding is now controlled.</p><div class="findings"><div class="finding"><b>Response –</b> Alert.</div><div class="finding"><b>Breathing –</b> 36/min.</div><div class="finding"><b>Central cap refill –</b> 4 seconds.</div></div>`,question:"Big Sick or Little Sick?",actions:[a("Big Sick",5,true,"Breathing rate over 30 and central cap refill over 3 seconds are Big Sick indicators, even if the casualty is alert.","This casualty is Big Sick."),a("Little Sick",5,false,"Being alert does not cancel out abnormal breathing and poor circulation signs.","This casualty is Big Sick because breathing and circulation signs are abnormal.")]},
{title:"Card selection",body:`<p>External limb bleed controlled. Casualty is Big Sick.</p>`,question:"Which card best fits?",actions:[a("Card 4 — External Bleed / Crush",6,true,"The main problem is visible external limb bleeding, so the external bleed card is the best fit.","Card 4 — External Bleed / Crush is the best fit."),a("Card 5 — Internal Bleed",6,false,"Internal bleed does not fit the primary visible problem here.","Card 4 — External Bleed / Crush is the best fit."),a("Card 6 — Fractures",6,false,"A fracture may exist, but the priority card focus is external bleeding.","Card 4 — External Bleed / Crush is the best fit.")]},reviewScreen()]},
{name:"Unconscious From Water",summary:"Pulled from water · not responding",learning:["Check danger, response and breathing.","Start resuscitation when not breathing normally.","Allocate roles early so CPR, AED, communications and kit preparation can happen together.","Use the CPR card when the casualty is not breathing normally."],screens:[
{title:"Tasking",body:`<div class="scenario"><p><b>Situation</b></p><p>Adult casualty.</p><p>Pulled from water.</p><p>Reported unconscious.</p></div>`,question:"",actions:[a("Proceed to casualty",1,true,"You approach the casualty.","Proceed to casualty so you can make an initial assessment.")]},
{title:"Arrival",body:`<p>The casualty is on the beach. Bystanders are nearby. They are not moving.</p>`,question:"What do you do first?",actions:[a("Check danger and response",2,true,"Start DRCABC by making the scene safe enough and checking response before moving to airway and breathing.","Check danger and response first."),a("Start chest compressions immediately",2,false,"CPR may be needed, but first confirm response and breathing.","Check danger and response first, then assess airway and breathing."),a("Look for a drowning card",2,false,"The card can support care, but the assessment comes first.","Check danger and response first.")]},
{title:"Assessment",body:`<p>You perform DRCABC.</p><div class="findings"><div class="finding"><b>D –</b> Safe enough. Wet/cold environment.</div><div class="finding"><b>R –</b> No response.</div><div class="finding"><b>A –</b> Airway opened.</div><div class="finding"><b>B –</b> Not breathing normally.</div><div class="finding"><b>C –</b> No signs of life.</div></div>`,question:"What is your immediate priority?",actions:[a("Begin resuscitation and call for AED",3,true,"Not breathing normally is an immediate life-threatening finding, so resuscitation and AED preparation should start now.","Begin resuscitation and call for an AED."),a("Put them in recovery position",3,false,"Recovery position is for a casualty who is breathing normally.","Begin resuscitation and call for an AED."),a("Ask bystanders what happened",3,false,"History is useful, but it must not delay resuscitation.","Begin resuscitation and call for an AED."),a("Warm them up first",3,false,"Preventing heat loss matters, but resuscitation is the immediate priority.","Begin resuscitation and call for an AED.")]},
{title:"Immediate priority",body:`<p>CPR is underway. AED is on its way. Crew are available.</p>`,question:"What helps most now?",actions:[a("Clear roles: CPR, AED, comms, kit",4,true,"Clear role allocation helps CPR, AED preparation, communications and casualty management happen simultaneously.","Allocate clear roles early."),a("Everyone reads the card together",4,false,"One person can check the card, but the team still needs clear roles.","Allocate clear roles early."),a("Move the casualty first",4,false,"Do not interrupt CPR unless movement is needed for safety or effective care.","Allocate clear roles early and continue immediate care."),a("Wait for paramedics",4,false,"Continue immediate care while help is coming.","Allocate clear roles early and continue immediate care.")]},
{title:"Big Sick / Little Sick",body:`<div class="findings"><div class="finding"><b>Response –</b> Unresponsive.</div><div class="finding"><b>Breathing –</b> Not normal.</div><div class="finding"><b>Circulation –</b> No signs of life.</div></div>`,question:"Big Sick or Little Sick?",actions:[a("Big Sick",5,true,"Unresponsive and not breathing normally is immediately life-threatening.","This casualty is Big Sick."),a("Little Sick",5,false,"Unresponsive and not breathing normally is not low risk.","This casualty is Big Sick.")]},
{title:"Card selection",body:`<p>Unconscious casualty pulled from water. Not breathing normally.</p>`,question:"Which card best fits?",actions:[a("Card 2 — Not Breathing / CPR",6,true,"The casualty is not breathing normally, so the CPR card is the best fit.","Card 2 — Not Breathing / CPR is the best fit."),a("Card 3 — Breathing Problems",6,false,"This is beyond breathing difficulty; they are not breathing normally.","Card 2 — Not Breathing / CPR is the best fit."),a("Card 8 — Hypothermia",6,false,"Cold exposure matters, but CPR is the priority card.","Card 2 — Not Breathing / CPR is the best fit.")]},reviewScreen()]},
{name:"Chest Pain",summary:"Afloat · pale, sweaty, chest pain",learning:["Start with DRCABC, even when the problem sounds medical.","Minimise exertion for chest pain.","Pale, sweaty presentation and poor circulation signs are red flags.","Use the specific chest pain card rather than a general medical card."],screens:[
{title:"Tasking",body:`<div class="scenario"><p><b>Situation</b></p><p>Male, 60s.</p><p>Onboard casualty vessel.</p><p>Chest pain reported.</p></div>`,question:"",actions:[a("Proceed to casualty",1,true,"You approach the casualty.","Proceed to casualty so you can make an initial assessment.")]},
{title:"Arrival",body:`<p>He is seated, pale and sweaty. He says his chest feels tight.</p>`,question:"What do you do first?",actions:[a("Start DRCABC assessment",2,true,"A structured assessment helps identify whether this is immediately serious before focusing on medication or movement.","Start DRCABC assessment first."),a("Ask for medication first",2,false,"Medication history may matter, but assessment comes first.","Start DRCABC assessment first."),a("Stand him up and walk him out",2,false,"Exertion can worsen chest pain and should be avoided.","Start DRCABC assessment first and keep him still."),a("Select a card",2,false,"Choose the card after initial assessment identifies the priority problem.","Start DRCABC assessment first.")]},
{title:"Assessment",body:`<p>You perform DRCABC.</p><div class="findings"><div class="finding"><b>D –</b> Boat made safe enough.</div><div class="finding"><b>R –</b> Alert but anxious.</div><div class="finding"><b>A –</b> Airway clear.</div><div class="finding"><b>B –</b> 24/min.</div><div class="finding"><b>C –</b> Pale, sweaty. Central cap refill 3 seconds.</div><div class="finding"><b>Pain –</b> Central chest tightness.</div></div>`,question:"What is your immediate priority?",actions:[a("Rest, reassure, monitor, update Coastguard",3,true,"Chest pain with pale, sweaty signs should be treated as serious. Rest and early communication support onward care.","Rest, reassure, monitor and update Coastguard."),a("Get him walking to the lifeboat",3,false,"Avoid exertion with chest pain unless movement is essential for safety.","Rest, reassure, monitor and update Coastguard."),a("Focus on seasickness",3,false,"Chest pain with pale, sweaty presentation is higher risk than simple seasickness.","Rest, reassure, monitor and update Coastguard."),a("Leave him while you prepare kit",3,false,"He needs ongoing monitoring and communication, not being left alone.","Rest, reassure, monitor and update Coastguard.")]},
{title:"Immediate priority",body:`<p>He remains pale and sweaty. Pain is still present.</p>`,question:"What next?",actions:[a("Check own GTN/aspirin and follow card",4,true,"Medication should only be considered within the card guidance and casualty's own medication context.","Check own GTN/aspirin and follow the card."),a("Give any painkiller available",4,false,"Do not improvise medication outside guidance.","Check own GTN/aspirin and follow the card."),a("Tell him to lie flat",4,false,"Position of comfort is usually better unless his condition changes.","Check own GTN/aspirin and follow the card."),a("Delay update until ashore",4,false,"Early update helps prepare onward care.","Check own GTN/aspirin and follow the card.")]},
{title:"Big Sick / Little Sick",body:`<div class="findings"><div class="finding"><b>Response –</b> Alert.</div><div class="finding"><b>Breathing –</b> 24/min.</div><div class="finding"><b>Circulation –</b> Pale, sweaty, cap refill 3 seconds.</div><div class="finding"><b>Pain –</b> Ongoing chest tightness.</div></div>`,question:"Big Sick or Little Sick?",actions:[a("Big Sick",5,true,"Chest pain with pale, sweaty signs and delayed cap refill should be treated as Big Sick.","This casualty is Big Sick."),a("Little Sick",5,false,"Being alert does not make ongoing chest pain with poor circulation signs low risk.","This casualty is Big Sick.")]},
{title:"Card selection",body:`<p>Ongoing chest pain with pale, sweaty presentation.</p>`,question:"Which card best fits?",actions:[a("Card 7 — Chest Pain",6,true,"The main problem is chest pain, so the specific chest pain card is the best fit.","Card 7 — Chest Pain is the best fit."),a("Card 3 — Breathing Problems",6,false,"Breathing is raised, but chest pain is the main problem.","Card 7 — Chest Pain is the best fit."),a("Card 10 — Medical Illness",6,false,"Use the more specific card when it fits the problem.","Card 7 — Chest Pain is the best fit.")]},reviewScreen()]}
];
function a(text,next,correct,feedback,correctWhy){return {text,next,correct,feedback,correctWhy};}
function reviewScreen(){return {title:"Review",body:"",question:"",actions:[]};}
function loadCompleted(){try{const saved=JSON.parse(sessionStorage.getItem("ccsCompleted")||"[]");return Array.isArray(saved)?saved:[]}catch(e){return[]}}
function saveCompleted(){sessionStorage.setItem("ccsCompleted",JSON.stringify(completed))}
function markCompleted(i){if(!completed.includes(i)){completed.push(i);saveCompleted()}}
function resetProgress(){completed=[];saveCompleted();renderMenu();window.scrollTo({top:0,behavior:"smooth"})}
function incompleteScenarioIndexes(){return scenarios.map((_,i)=>i).filter(i=>!completed.includes(i))}
function completedCount(){return completed.length}
function completionList(){return `<div class="completion">`+scenarios.map((sc,i)=>{const done=completed.includes(i);return `<div class="completion-row"><span>Scenario ${i+1}: ${sc.name}</span><span class="${done?'tick':'small'}">${done?'✓ Completed':'Not completed'}</span></div>`}).join("")+`</div>`}
function currentScreens(){return scenarios[scenarioIndex].screens}
function renderMenu(){mode="menu";attemptLog={};const left=scenarios.length-completedCount();document.getElementById("stepText").textContent=completedCount()+" of "+scenarios.length+" completed";document.getElementById("scenarioText").textContent=left?"Choose practice":"Complete";document.getElementById("bar").style.width=Math.round((completedCount()/scenarios.length)*100)+"%";let html=`<h2>Casualty care practice</h2>`+completionList()+`<div class="actions">`;if(left){html+=`<button class="primary" onclick="startRandomScenario()">Start random scenario</button>`}html+=scenarios.map((sc,i)=>`<button class="secondary" onclick="startScenario(${i})">Scenario ${i+1}: ${sc.name}</button>`).join("");if(completedCount()){html+=`<button class="secondary" onclick="resetProgress()">Reset progress</button>`}html+=`</div>`;document.getElementById("app").innerHTML=html}
function startRandomScenario(){const available=incompleteScenarioIndexes();if(!available.length){renderMenu();return}startScenario(available[Math.floor(Math.random()*available.length)])}
function startScenario(i){scenarioIndex=i;step=0;mode="scenario";attemptLog={};render();window.scrollTo({top:0,behavior:"smooth"})}
function render(){const screens=currentScreens(), s=screens[step], onReview=step===screens.length-1;if(onReview){markCompleted(scenarioIndex)}document.getElementById("stepText").textContent="Step "+(step+1)+" of "+screens.length;document.getElementById("scenarioText").textContent="Scenario "+(scenarioIndex+1)+(completed.includes(scenarioIndex)?" ✓":"");document.getElementById("bar").style.width=Math.round((step/(screens.length-1))*100)+"%";let html=`<h2>${s.title}</h2>`;if(onReview){html+=reviewHtml()}else{html+=s.body;if(s.question){html+=`<p class="question">${s.question}</p>`}html+=`<div class="actions">`;s.actions.forEach((act,i)=>{html+=`<button onclick="choose(${i})" class="answer ${step===0?'primary':''}" data-answer-index="${i}">${act.text}</button>`});html+=`</div><div id="feedback" class="feedback"></div><div id="continue" class="continue"></div>`}document.getElementById("app").innerHTML=html}
function reviewHtml(){const screens=currentScreens();const decisionSteps=screens.map((s,i)=>i).filter(i=>i>0 && i<screens.length-1);const correctFirst=decisionSteps.filter(i=>attemptLog[i]===true).length;const corrected=decisionSteps.filter(i=>attemptLog[i]===false).length;let html=`<div class="review-banner"><b>Scenario complete.</b><br>${scenarios[scenarioIndex].name}</div><div class="score-grid"><div class="score-box"><b>${correctFirst}/${decisionSteps.length}</b><span class="small">Correct first time</span></div><div class="score-box"><b>${corrected}</b><span class="small">Required correction</span></div></div><p class="question">Key learning points</p><ul>`;scenarios[scenarioIndex].learning.forEach(l=>html+=`<li>${l}</li>`);html+=`</ul>`+completionList();if(completedCount()===scenarios.length){html+=`<p class="question">All scenarios completed.</p>`}html+=`<div class="actions">`;if(incompleteScenarioIndexes().length){html+=`<button onclick="tryAnother()" class="primary">Try another random scenario</button>`}else{html+=`<button onclick="resetProgress()" class="primary">Reset progress</button>`}html+=`<button onclick="restartScenario()" class="secondary">Restart scenario</button><button onclick="renderMenu()" class="secondary">Back to start</button></div>`;return html}
function choose(i){const screens=currentScreens(), s=screens[step], chosen=s.actions[i], next=chosen.next;if(step===0){step=next;render();window.scrollTo({top:0,behavior:"smooth"});return}if(attemptLog[step]===undefined){attemptLog[step]=!!chosen.correct}const correctIndex=s.actions.findIndex(x=>x.correct);document.querySelectorAll("button.answer").forEach((b,idx)=>{b.disabled=true;b.classList.remove("primary");if(idx===i)b.classList.add("selected");if(idx===correctIndex)b.classList.add("correct");if(idx===i && !chosen.correct)b.classList.add("incorrect");if(idx!==i && idx!==correctIndex)b.classList.add("muted")});const fb=document.getElementById("feedback");fb.className="feedback show "+(chosen.correct?"good":"warn");if(chosen.correct){fb.innerHTML=`<b>Good decision.</b> ${chosen.feedback}`}else{const correct=s.actions[correctIndex];fb.innerHTML=`<b>Prompt.</b> ${chosen.feedback}<br><br><b>Correct pathway:</b> ${correct.correctWhy}`;}document.getElementById("continue").innerHTML=`<button class="primary" onclick="go(${next})">Continue</button>`}
function tryAnother(){startRandomScenario()}function restartScenario(){step=0;attemptLog={};render();window.scrollTo({top:0,behavior:"smooth"})}function go(next){step=next;render();window.scrollTo({top:0,behavior:"smooth"})}
renderMenu();
</script>
</body>
</html>
